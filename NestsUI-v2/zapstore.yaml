identifier: com.nostrnests.app
name: Nests
summary: Decentralized live audio rooms on Nostr
description: Host and join live audio conversations on the decentralized Nostr network. Features real-time audio via MoQ (Media over QUIC), Ditto theming, custom emoji reactions, avatar shapes, live chat with reactions and zaps, hand raising, room permissions, and NIP-46 remote signer support. No algorithms, no gatekeepers, just real conversations.
